name: Build
on:
  [push,workflow_dispatch]
  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '18'
        - name: Install dependencies
          run: npm install
        - name: Linter 
          run: npm run lint
        - name : Run tests
          run: npm test
        - name: Build 
          run: npm run build
  jobs:
    deploy:
      runs-on: ubuntu-latest
      needs: build
      steps:
        - name: Deployment Started
          runs: echo "Deployment Started"

